<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ESP32 E-Ra Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://eoh-jsc.github.io/era-widget/era_widget.js"></script>
    
    <style>
        body { background: #050505; display: flex; justify-content: center; gap: 20px; padding-top: 50px; font-family: 'Share Tech Mono', monospace; color: white;}
        .card { background: #121212; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #333; width: 250px; }
        .val { font-size: 70px; }
        .t-card { border-color: #ff9d00; color: #ff9d00; }
        .h-card { border-color: #00d2ff; color: #00d2ff; }
    </style>
</head>
<body>
    <div class="card t-card">
        <h3>TEMPERATURE</h3>
        <div><span class="val" id="val-t">--</span> °C</div>
    </div>
    <div class="card h-card">
        <h3>HUMIDITY</h3>
        <div><span class="val" id="val-h">--</span> %</div>
    </div>

   <script>
        const eraWidget = new EraWidget();
        const tempElement = document.getElementById('val-t');
        const humElement = document.getElementById('val-h');

        eraWidget.init({
            onValues: function(values) {
                console.log("Dữ liệu nhận được:", values); // Kiểm tra log tại F12

                // 1. Quét theo Tên Pin (V1, V2)
                if (values.V1 !== undefined) tempElement.innerText = values.V1;
                if (values.V2 !== undefined) humElement.innerText = values.V2;

                // 2. Quét theo Thứ tự (Dành cho trường hợp E-Ra mapping theo mảng cấu hình)
                // values[0] là Value 1 trong cấu hình, values[1] là Value 2
                if (values[0] !== undefined) tempElement.innerText = values[0];
                if (values[1] !== undefined) humElement.innerText = values[1];
            }
        });
    </script>
