<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Sensor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Montserrat', sans-serif; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; position: relative;
        }
        .toggle-btn {
            position: absolute; top: 20px; right: 20px;
            background-color: #1a1a1a; color: #ffffff; border: 1px solid #333;
            padding: 10px 15px; border-radius: 8px; font-family: inherit;
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .toggle-btn:hover { background-color: #2a2a2a; }
        .dashboard { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card {
            background-color: #121212; width: 350px; height: 250px; border-radius: 15px;
            padding: 25px; display: flex; flex-direction: column; position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; letter-spacing: 1.5px; }
        .card-body { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .value { font-family: 'Share Tech Mono', monospace; font-size: 90px; line-height: 1; }
        .unit { font-size: 30px; margin-left: 10px; margin-top: 30px; font-weight: normal; }
        .temp-card { border-top: 3px solid #ff9d00; }
        .temp-card .title { color: #ff9d00; text-shadow: 0 0 10px rgba(255, 157, 0, 0.4); }
        .temp-card .value { color: #ffb700; text-shadow: 0 0 20px rgba(255, 183, 0, 0.6), 0 0 40px rgba(255, 183, 0, 0.2); }
        .hum-card { border-top: 3px solid #00d2ff; }
        .hum-card .title { color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        .hum-card .value { color: #00e5ff; text-shadow: 0 0 20px rgba(0, 229, 255, 0.6), 0 0 40px rgba(0, 229, 255, 0.2); }
        .status-container { display: flex; justify-content: center; gap: 10px; margin-top: auto; }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        .badge-dim { background-color: #2a2a2a; color: #666; }
        .badge-active { background-color: #00ff00; color: #000; box-shadow: 0 0 15px #00ff00; }
    </style>
</head>
<body>

    <button class="toggle-btn">Đổi °C / °F</button>

    <div class="dashboard">
        <div class="card temp-card">
            <div class="card-header"><span class="title">TEMPERATURE</span><span class="icon">🌡️</span></div>
            <div class="card-body"><span class="value" id="temp-val">0.0</span><span class="unit">°C</span></div>
        </div>

        <div class="card hum-card">
            <div class="card-header"><span class="title">HUMIDITY</span><span class="icon">💧</span></div>
            <div class="card-body"><span class="value" id="hum-val">0</span><span class="unit">%</span></div>
            <div class="status-container">
                <span class="status-badge badge-dim">DRY</span>
                <span class="status-badge badge-active">GOOD</span>
                <span class="status-badge badge-dim">HUMID</span>
            </div>
        </div>
    </div>

    <script>
        const tempElement = document.getElementById('temp-val');
        const humElement = document.getElementById('hum-val');

        window.addEventListener('message', function(event) {
            let payload = event.data;
            
            // Xử lý chống lỗi nếu dữ liệu là chuỗi
            if (typeof payload === 'string') {
                try { payload = JSON.parse(payload); } catch(e) { return; }
            }

            // BỎ QUA các gói tin hệ thống của E-Ra (như iframe-pos)
            if (payload && payload.type === 'iframe-pos') {
                return; 
            }

            // In ra console ĐỂ KIỂM TRA gói tin thực sự chứa dữ liệu
            console.log("Dữ liệu cảm biến nhận được:", payload);

            // Thuật toán bóc tách dữ liệu
            // Giả định E-Ra gửi dữ liệu dạng: { "data": { "V1": 25.5, "V2": 80 } } hoặc tương tự
            let safeData = payload.data !== undefined ? payload.data : 
                          (payload.value !== undefined && typeof payload.value === 'object' ? payload.value : payload);

            // Xử lý Nhiệt độ (V1)
            if (safeData.V1 !== undefined) {
                tempElement.innerText = parseFloat(safeData.V1).toFixed(1);
            } else if (payload.pin === "V1" || payload.pin === 1) {
                tempElement.innerText = parseFloat(payload.value).toFixed(1);
            }

            // Xử lý Độ ẩm (V2)
            if (safeData.V2 !== undefined) {
                humElement.innerText = Math.round(safeData.V2);
            } else if (payload.pin === "V2" || payload.pin === 2) {
                humElement.innerText = Math.round(payload.value);
            }
        });
    </script>
</body>
</html>
