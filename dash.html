<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        /* Màn hình Terminal chẩn đoán */
        #terminal { background: #001a00; border: 1px solid #00ff00; width: 90%; max-width: 750px; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; color: #00ff00; word-wrap: break-word; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .highlight { color: #ffeb3b; font-weight: bold; }
        .dashboard { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card { background: #121212; width: 330px; height: 230px; border-radius: 15px; padding: 25px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .card-header { display: flex; justify-content: space-between; font-size: 16px; letter-spacing: 1.5px; }
        .card-body { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .value { font-family: 'Share Tech Mono', monospace; font-size: 80px; }
        .unit { font-size: 25px; margin-left: 10px; margin-top: 20px; }
        .temp-card { border-top: 3px solid #ff9d00; } .temp-card .value { color: #ffb700; }
        .hum-card { border-top: 3px solid #00d2ff; } .hum-card .value { color: #00e5ff; }
    </style>
</head>
<body>
    <div id="terminal">
        <div>[HỆ THỐNG QUÉT DỮ LIỆU TỪ E-RA DASHBOARD]</div>
        <div>-----------------------------------------</div>
        <div><span class="highlight">Dữ liệu kẹp trên Link (URL):</span> <span id="url-data">Đang quét...</span></div>
        <div style="margin-top: 5px;"><span class="highlight">Dữ liệu ngầm (postMessage):</span> <span id="msg-data">Chờ tín hiệu...</span></div>
    </div>

    <div class="dashboard">
        <div class="card temp-card">
            <div class="card-header"><span style="color:#ff9d00">TEMPERATURE</span><span>🌡️</span></div>
            <div class="card-body"><span class="value" id="temp-val">--</span><span class="unit">°C</span></div>
        </div>
        <div class="card hum-card">
            <div class="card-header"><span style="color:#00d2ff">HUMIDITY</span><span>💧</span></div>
            <div class="card-body"><span class="value" id="hum-val">--</span><span class="unit">%</span></div>
        </div>
    </div>

    <script>
        // 1. Quét dữ liệu trên URL
        const params = new URLSearchParams(window.location.search);
        let urlText = "";
        for (let [k, v] of params.entries()) { urlText += `[${k}: ${v}] `; }
        document.getElementById('url-data').innerText = urlText !== "" ? urlText : "Không có dữ liệu!";

        // 2. Lắng nghe tín hiệu Realtime
        window.addEventListener('message', function(event) {
            let payload = event.data;
            let rawStr = typeof payload === 'object' ? JSON.stringify(payload) : payload;

            // Bỏ qua tin rác tọa độ
            if (rawStr.includes('iframe-pos') || rawStr.includes('webpack')) return;

            // In thô ra Terminal
            document.getElementById('msg-data').innerText = rawStr;

            // Thuật toán tự động bắt số liệu tống lên UI
            try {
                let d = typeof payload === 'string' ? JSON.parse(payload) : payload;
                let target = d.data || d.value || d;
                
                // Quét búa xua các tên biến mà E-Ra có thể ném ra
                let temp = target.V1 || target.value1 || target.Value1 || target.Nhietdo || target.nhietdo;
                let hum = target.V2 || target.value2 || target.Value2 || target.doam || target.Doam;

                if(temp !== undefined) document.getElementById('temp-val').innerText = parseFloat(temp).toFixed(1);
                if(hum !== undefined) document.getElementById('hum-val').innerText = Math.round(hum);
            } catch(e) {}
        });
    </script>
</body>
</html>
